version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: n8n_memory

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - ai-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      - GENERIC_TIMEZONE=Asia/Kolkata
      - DB_TYPE=sqlite

    volumes:
      - n8n_data:/home/node/.n8n

    networks:
      - ai-network

    depends_on:
      - postgres

  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api-service
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080

      AUTHENTICATION_API_KEY: your-global-api-key

      CONFIG_SESSION_PHONE_CLIENT: Chrome
      CONFIG_SESSION_PHONE_NAME: AI Recruiter

    volumes:
      - evolution_instances:/evolution/instances

    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  evolution_instances: